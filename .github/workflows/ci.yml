name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: dge
          POSTGRES_PASSWORD: dge_dev
          POSTGRES_DB: dungeon_gate_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check app/ tests/

      - name: Mypy type check
        working-directory: backend
        run: mypy app/ --ignore-missing-imports

      - name: Pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://dge:dge_dev@localhost:5432/dungeon_gate_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret
        run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build ./backend
