[tool.pytest.ini_options]
filterwarnings = [
    "ignore::DeprecationWarning:pytest_asyncio",
]

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true